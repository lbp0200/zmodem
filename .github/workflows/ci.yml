# ──────────────────────────────────────────────────────────────
# CI: dart analyze + dart test (core + unit + corpus) + coverage
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # ── Step 1: static analysis ────────────────────────────
      - name: dart analyze
        run: dart analyze

      # ── Step 2: core + unit + corpus replay tests ──────────
      - name: dart test (core + unit + corpus)
        run: >
          dart test
          test/core_test.dart
          test/src/
          test/fuzz/corpus_replay_test.dart
          test/fuzz/fragmentation_fuzz_test.dart
          --reporter expanded
        timeout-minutes: 5

      # ── Step 3: coverage ──────────────────────────────────
      - name: dart test --coverage
        run: |
          dart test \
            test/core_test.dart \
            test/src/ \
            test/fuzz/corpus_replay_test.dart \
            test/fuzz/fragmentation_fuzz_test.dart \
            --coverage=coverage
        timeout-minutes: 5

      - name: Format coverage report
        run: |
          dart pub global activate coverage
          format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json \
            --report-on=lib/
        timeout-minutes: 2

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

      # ── Step 4: metrics report ─────────────────────────────
      - name: Metrics report
        run: dart run tool/ci_report.dart
        timeout-minutes: 2
